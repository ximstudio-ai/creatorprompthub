// ─── API CALL ─────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userPrompt, maxTokens = 1500) {
  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: Array.isArray(userPrompt) ? userPrompt : [{ type:"text", text: userPrompt }] }],
    }),
  });
  const data = await response.json();
  return data.content?.[0]?.text || "";
}

// ─── COPY BUTTON ─────────────────────────────────────────────────────────────
function CopyButton({ text, label = "Copy", small = false }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {});
      }
    }
  };
  return (
    <button onClick={handleCopy} style={{
      display: "flex", alignItems: "center", gap: small ? "4px" : "6px",
      padding: small ? "5px 10px" : "8px 14px", borderRadius: "8px", border: "1px solid rgba(255,255,255,0.15)",
      background: copied ? "rgba(52,211,153,0.2)" : "rgba(255,255,255,0.08)",
      color: copied ? "#34d399" : "#a0aec0", cursor: "pointer",
      fontSize: small ? "11px" : "13px", fontFamily: "inherit", transition: "all 0.2s",
      whiteSpace: "nowrap",
    }}>
      <CopyIcon /> {copied ? "Copied!" : label}
    </button>
  );
}

function ImprovedResultCard({ result, type, onRegenerate }) {
  const [activeTab, setActiveTab] = useState("prompt");
  const [copied, setCopied] = useState(null);
  const [saved, setSaved] = useState(false);
  const [saveAnim, setSaveAnim] = useState(false);
  if (!result) return null;

  const cp = (text, key) => {
    try { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); } catch { navigator.clipboard?.writeText(text); }
    setCopied(key); setTimeout(() => setCopied(null), 2000);
  };
  const cpAll = () => {
    const txt = [result.prompt && "PROMPT:\n" + result.prompt, result.hook && "HOOK:\n" + result.hook, result.caption && "CAPTION:\n" + result.caption, result.hashtags && "HASHTAGS:\n" + result.hashtags, result.cta && "CTA:\n" + result.cta].filter(Boolean).join("\n\n");
    cp(txt, "all");
  };

  const handleSave = () => {
    try {
      const existing = JSON.parse(localStorage.getItem("cph_saved_prompts") || "[]");
      const entry = { id: Date.now(), type, result, savedAt: new Date().toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" }) };
      localStorage.setItem("cph_saved_prompts", JSON.stringify([entry, ...existing].slice(0, 100)));
    } catch {}
    setSaved(true);
    setSaveAnim(true);
    setTimeout(() => setSaveAnim(false), 600);
  };

  const TABS = [
    { key: "prompt",   label: "Prompt",   icon: "✦", color: "#a78bfa", desc: "The main prompt" },
    { key: "hook",     label: "Hook",     icon: "🎣", color: "#f472b6", desc: "Opening line" },
    { key: "caption",  label: "Caption",  icon: "💬", color: "#60a5fa", desc: "Post caption" },
    { key: "hashtags", label: "Hashtags", icon: "#", color: "#34d399",  desc: "Tags" },
    { key: "cta",      label: "CTA",      icon: "→", color: "#fbbf24",  desc: "Call to action" },
  ].filter(t => result[t.key]);

  const active = TABS.find(t => t.key === activeTab) || TABS[0];
  const ac = active?.color || "#a78bfa";

  return (
    <div style={{
      background: "linear-gradient(145deg, rgba(10,8,28,0.95), rgba(7,6,17,0.98))",
      border: `1px solid ${ac}30`,
      borderRadius: "20px", overflow: "hidden",

          {/* Animated glow dot */}

            <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: ac, boxShadow: `0 0 10px ${ac}` }} />
            <div style={{ position: "absolute", inset: "-3px", borderRadius: "50%", background: ac, opacity: 0.2, animation: "pulse 2s infinite" }} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ color: "#e2e8f0", fontSize: "13px", fontWeight: "700", lineHeight: 1 }}>Generated Result</div>
            <div style={{ color: "#4a5568", fontSize: "10px", marginTop: "2px" }}>{type} · Click any section to copy</div>
          </div>
          {/* Action buttons */}

            {/* Save button */}
            <button onClick={handleSave} style={{
              display: "flex", alignItems: "center", gap: "5px",
              background: saved ? "rgba(52,211,153,0.15)" : "rgba(255,255,255,0.04)",
              border: `1px solid ${saved ? "rgba(52,211,153,0.4)" : "rgba(255,255,255,0.08)"}`,
              borderRadius: "8px", padding: "6px 12px",
              color: saved ? "#34d399" : "#4a5568",
              cursor: saved ? "default" : "pointer", fontFamily: "inherit",
              fontSize: "11px", fontWeight: "700", transition: "all 0.25s",
              transform: saveAnim ? "scale(1.12)" : "scale(1)",
            }}

                display: "flex", alignItems: "center", gap: "5px",
                background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
                borderRadius: "8px", padding: "6px 12px",
                color: "#4a5568", cursor: "pointer", fontFamily: "inherit",
                fontSize: "11px", fontWeight: "700", transition: "all 0.2s",
              }}
                onMouseEnter={e => { e.currentTarget.style.color = "#94a3b8"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.15)"; e.currentTarget.style.background = "rgba(255,255,255,0.07)"; }}
                onMouseLeave={e => { e.currentTarget.style.color = "#4a5568"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; e.currentTarget.style.background = "rgba(255,255,255,0.04)"; }}
              >
                <svg width="10" height="10" viewBox="0 0 11 11" fill="none"><path d="M9.5 2A5.5 5.5 0 1 0 10 5.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><path d="M10 2V5.5H6.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Regen
              </button>
            )}
            <button onClick={cpAll} style={{
              display: "flex", alignItems: "center", gap: "5px",
              background: copied === "all" ? `${ac}20` : `${ac}10`,
              border: `1px solid ${copied === "all" ? ac + "60" : ac + "25"}`,
              borderRadius: "8px", padding: "6px 12px",
              color: copied === "all" ? ac : "#718096",
              cursor: "pointer", fontFamily: "inherit",
              fontSize: "11px", fontWeight: "700", transition: "all 0.2s",
            }}>
              {copied === "all"
                ? <><span>✓</span> Copied!</>
                : <><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy All</>}
            </button>
          </div>
        </div>

        {/* Tab pills */}
        <div style={{ display: "flex", gap: "4px", overflowX: "auto", paddingBottom: "1px" }}>
          {TABS.map(t => {
            const isActive = activeTab === t.key;
            return (
              <button key={t.key} onClick={() => setActiveTab(t.key)} style={{
                display: "flex", alignItems: "center", gap: "5px",
                padding: "7px 13px", border: "none",
                background: isActive ? `${t.color}16` : "transparent",
                borderBottom: isActive ? `2px solid ${t.color}` : "2px solid transparent",
                borderRadius: isActive ? "8px 8px 0 0" : "8px 8px 0 0",
                color: isActive ? t.color : "#2d3748",
                cursor: "pointer", fontFamily: "inherit",
                fontSize: "12px", fontWeight: "700",
                transition: "all 0.18s", whiteSpace: "nowrap", flexShrink: 0,
              }}
                onMouseEnter={e => { if (!isActive) { e.currentTarget.style.color = "#718096"; e.currentTarget.style.background = "rgba(255,255,255,0.04)"; }}}
                onMouseLeave={e => { if (!isActive) { e.currentTarget.style.color = "#2d3748"; e.currentTarget.style.background = "transparent"; }}}
              >
                <span style={{ fontSize: "11px", opacity: isActive ? 1 : 0.5 }}>{t.icon}</span>
                {t.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* ── Content area ── */}
      <div style={{ padding: "20px 18px" }}>
        {TABS.map(t => activeTab === t.key && (
          <div key={t.key} style={{ animation: "fadeInUp 0.18s ease" }}>
            {/* Section label */}
            <div style={{ display: "flex", alignItems: "center", gap: "7px", marginBottom: "12px" }}>
              <div style={{ width: "3px", height: "16px", background: t.color, borderRadius: "2px", flexShrink: 0 }} />
              <span style={{ color: t.color, fontSize: "10px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.12em" }}>{t.label}</span>
              <span style={{ color: "#2d3748", fontSize: "10px" }}>— {t.desc}</span>
            </div>

            {/* Content block */}
            <div style={{
              background: `${t.color}06`,
              border: `1px solid ${t.color}15`,
              borderRadius: "12px", padding: "16px 18px",
              position: "relative",
            }}>
              <p style={{ color: "#c4b5fd" === t.color ? "#d8b4fe" : "#94a3b8", fontSize: "14px", lineHeight: "1.8", margin: 0, whiteSpace: "pre-wrap", letterSpacing: "0.01em" }}>
                {result[t.key]}
              </p>

              {/* Copy button — bottom right */}
              <button onClick={() => cp(result[t.key], t.key)} style={{
                position: "absolute", bottom: "12px", right: "12px",
                display: "flex", alignItems: "center", gap: "4px",
                background: copied === t.key ? `${t.color}22` : "rgba(0,0,0,0.35)",
                border: `1px solid ${copied === t.key ? t.color + "55" : "rgba(255,255,255,0.08)"}`,
                borderRadius: "7px", padding: "5px 11px",
                color: copied === t.key ? t.color : "#4a5568",
                cursor: "pointer", fontFamily: "inherit",
                fontSize: "11px", fontWeight: "700", transition: "all 0.2s",
                backdropFilter: "blur(8px)",
              }}
                onMouseEnter={e => { if (copied !== t.key) { e.currentTarget.style.color = "#94a3b8"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.16)"; }}}
                onMouseLeave={e => { if (copied !== t.key) { e.currentTarget.style.color = "#4a5568"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.08)"; }}}
              >
                {copied === t.key
                  ? <><span>✓</span> Copied!</>
                  : <><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy</>}
              </button>
            </div>

            {/* Char count */}
            <div style={{ marginTop: "8px", display: "flex", justifyContent: "flex-end" }}>
              <span style={{ color: "#2d3748", fontSize: "10px" }}>{result[t.key]?.length} chars</span>
            </div>
          </div>
        ))}
      </div>

      {/* ── Mini section previews ── */}
      {TABS.length > 1 && (
        <div style={{ padding: "0 18px 16px", display: "flex", gap: "6px", overflowX: "auto" }}>
          {TABS.filter(t => t.key !== activeTab).map(t => (
            <button key={t.key} onClick={() => setActiveTab(t.key)} style={{
              background: "rgba(255,255,255,0.02)", border: `1px solid ${t.color}18`,
              borderRadius: "10px", padding: "8px 12px",
              cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
              textAlign: "left", flex: "0 0 auto", maxWidth: "180px",
            }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = `${t.color}40`; e.currentTarget.style.background = `${t.color}08`; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = `${t.color}18`; e.currentTarget.style.background = "rgba(255,255,255,0.02)"; }}
            >
              <div style={{ color: t.color, fontSize: "9px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>{t.icon} {t.label}</div>
              <div style={{ color: "#4a5568", fontSize: "10px", lineHeight: "1.4", overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
                {result[t.key]}
              </div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}


// ─── CONTENT TYPE COLORS ─────────────────────────────────────────────────────
const PILLAR_COLORS = {
  "Educate":   { bg: "rgba(96,165,250,0.15)",  border: "rgba(96,165,250,0.35)",  text: "#60a5fa"  },
  "Entertain": { bg: "rgba(244,114,182,0.15)", border: "rgba(244,114,182,0.35)", text: "#f472b6"  },
  "Inspire":   { bg: "rgba(167,139,250,0.15)", border: "rgba(167,139,250,0.35)", text: "#c4b5fd"  },
  "Sell":      { bg: "rgba(251,191,36,0.15)",  border: "rgba(251,191,36,0.35)",  text: "#fbbf24"  },
  "Engage":    { bg: "rgba(52,211,153,0.15)",  border: "rgba(52,211,153,0.35)",  text: "#34d399"  },
};
const TYPE_ICONS = {
  "Reel":"🎬","Carousel":"🃏","Story":"📖","TikTok":"🎵","Tweet":"🐦",
  "Blog":"📝","Email":"📧","Podcast":"🎙️","Short":"▶️","Pin":"📌",
};

function CalendarSection({ niche, platform, tone, audiencePersona, audienceAge, calendarFreq, setCalendarFreq, calendarLoading, calendarPlan, calendarError, handleCalendar, setTopic }) {
  const [viewMode, setViewMode] = useState("grid");   // grid | list
  const [expandedDay, setExpandedDay] = useState(null);
  const [activeWeek, setActiveWeek] = useState(0);
  const [copied, setCopied] = useState(false);

  const pillarCounts = {};
  if (calendarPlan) {
    calendarPlan.weeks?.forEach(w => w.days?.forEach(d => {
      pillarCounts[d.pillar] = (pillarCounts[d.pillar] || 0) + 1;
    }));
  }
  const totalDays = calendarPlan ? calendarPlan.weeks?.reduce((s, w) => s + (w.days?.length || 0), 0) : 0;

  const exportCSV = () => {
    const rows = [["Day","Date","Content Type","Pillar","Idea","Hook","Caption","Best Time"]];
    (calendarPlan?.weeks || []).forEach(w => {
      (w.days || []).forEach(d => {
        rows.push([d.day, d.dayName || "", d.contentType, d.pillar, `"${d.idea}"`, `"${d.hook}"`, `"${d.caption || ""}"`, d.bestTime || ""]);
      });
    });
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `content-calendar-${niche}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const copyAll = () => {
    const lines = [`📅 ${calendarPlan?.title}\nNiche: ${niche} | Platform: ${platform} | Frequency: ${calendarFreq}\n`];
    (calendarPlan?.weeks || []).forEach(w => {
      lines.push(`\n━━ ${w.weekLabel}: ${w.theme} ━━`);
      lines.push(w.themeGoal || "");
      (w.days || []).forEach(d => {
        lines.push(`\nDay ${d.day} (${d.dayName}) — ${d.emoji || ""} ${d.contentType} [${d.pillar}]`);
        lines.push(`Idea: ${d.idea}`);
        lines.push(`Hook: "${d.hook}"`);
        if (d.caption) lines.push(`Caption: ${d.caption}`);
        if (d.bestTime) lines.push(`Best Time: ${d.bestTime}`);
      });
    });
    const text = lines.join("\n");
    try {
      const ta = document.createElement("textarea"); ta.value = text;
      ta.style.cssText = "position:fixed;top:-9999px;opacity:0;"; document.body.appendChild(ta);
      ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    } catch { navigator.clipboard?.writeText(text); }
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const weeks = calendarPlan?.weeks || [];
  const currentWeek = weeks[activeWeek] || null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
      {/* ── Header Card ── */}
      <div style={{
        background: "linear-gradient(135deg, rgba(96,165,250,0.08), rgba(167,139,250,0.06))",
        border: "1px solid rgba(96,165,250,0.2)", borderRadius: "18px", padding: "20px 22px",
      }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
            <div style={{ width: "44px", height: "44px", borderRadius: "12px", background: "linear-gradient(135deg, #60a5fa, #a78bfa)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "22px", flexShrink: 0 }}>📅</div>
            <div>
              <div style={{ color: "#93c5fd", fontSize: "15px", fontWeight: "800", fontFamily: "var(--font-display)" }}>30-Day Content Calendar</div>
              <div style={{ color: "#4a5568", fontSize: "12px", marginTop: "2px" }}>Niche ke liye poora month ka strategic plan</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
            <select value={calendarFreq} onChange={e => setCalendarFreq(e.target.value)} style={{ background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", padding: "8px 12px", color: "#94a3b8", fontFamily: "inherit", fontSize: "12px", outline: "none", cursor: "pointer" }}>
              {CALENDAR_FREQUENCIES.map(f => <option key={f} value={f}>{f}</option>)}
            </select>
            <button onClick={handleCalendar} disabled={calendarLoading} style={{
              background: calendarLoading ? "rgba(96,165,250,0.1)" : "linear-gradient(135deg, #3b82f6, #6366f1)",
              border: "none", borderRadius: "10px", padding: "9px 20px",
              color: "white", cursor: calendarLoading ? "not-allowed" : "pointer",
              fontFamily: "inherit", fontSize: "13px", fontWeight: "700",
              opacity: calendarLoading ? 0.7 : 1, transition: "all 0.2s",
              display: "flex", alignItems: "center", gap: "7px",
            }}>
              {calendarLoading
                ? <><span style={{ animation: "spin 0.7s linear infinite", display: "inline-block" }}>⟳</span> Generating...</>
                : <>{calendarPlan ? "↻ Regenerate" : "✨ Generate Plan"}</>}
            </button>
          </div>
        </div>

        {/* Loading progress bar */}
        {calendarLoading && (
          <div style={{ marginTop: "16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
              <span style={{ color: "#4a5568", fontSize: "11px" }}>Building your 30-day strategy...</span>
              <span style={{ color: "#60a5fa", fontSize: "11px", fontWeight: "700" }}>AI thinking</span>
            </div>
            <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: "100px", height: "4px", overflow: "hidden" }}>
              <div style={{ height: "100%", background: "linear-gradient(90deg, #60a5fa, #a78bfa)", borderRadius: "100px", width: "60%", animation: "shimmer 1.5s infinite", backgroundSize: "200% 100%" }} />
            </div>
          </div>
        )}

        {/* Error display */}
        {calendarError && !calendarLoading && (
          <div style={{ marginTop: "14px", background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.25)", borderRadius: "10px", padding: "12px 16px", display: "flex", alignItems: "center", gap: "10px" }}>
            <span style={{ fontSize: "16px" }}>⚠️</span>
            <span style={{ color: "#f87171", fontSize: "13px", fontWeight: "600" }}>{calendarError}</span>
            <button onClick={handleCalendar} style={{ marginLeft: "auto", background: "rgba(248,113,113,0.15)", border: "1px solid rgba(248,113,113,0.3)", borderRadius: "7px", padding: "5px 12px", color: "#f87171", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "700", whiteSpace: "nowrap" }}>
              Retry →
            </button>
          </div>
        )}
      </div>

      {/* ── Plan ready ── */}
      {calendarPlan && !calendarLoading && (
        <div style={{ display: "flex", flexDirection: "column", gap: "16px", animation: "fadeInUp 0.4s ease" }}>

          {/* Plan meta + export bar */}
          <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "14px", padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "12px" }}>
            <div>
              <div style={{ fontFamily: "var(--font-display)", color: "#e2e8f0", fontSize: "17px", fontWeight: "800" }}>
                {calendarPlan.title || `30-Day ${niche} Plan`}
              </div>
              <div style={{ color: "#4a5568", fontSize: "12px", marginTop: "3px" }}>
                {platform} · {calendarFreq} · {tone} · {totalDays} posts planned
              </div>
            </div>
            <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
              {/* View toggle */}
              <div style={{ display: "flex", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "8px", padding: "3px" }}>
                {[{ v: "grid", icon: "⊞" }, { v: "list", icon: "☰" }].map(({ v, icon }) => (
                  <button key={v} onClick={() => setViewMode(v)} style={{
                    background: viewMode === v ? "rgba(96,165,250,0.2)" : "transparent",
                    border: "none", borderRadius: "6px", padding: "5px 9px",
                    color: viewMode === v ? "#60a5fa" : "#4a5568", cursor: "pointer", fontSize: "13px",
                  }}>{icon}</button>
                ))}
              </div>
              <button onClick={copyAll} style={{ background: copied ? "rgba(52,211,153,0.2)" : "rgba(255,255,255,0.06)", border: `1px solid ${copied ? "rgba(52,211,153,0.4)" : "rgba(255,255,255,0.1)"}`, borderRadius: "8px", padding: "7px 13px", color: copied ? "#34d399" : "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "12px", fontWeight: "700", transition: "all 0.2s" }}>
                {copied ? "✓ Copied!" : "📋 Copy All"}
              </button>
              <button onClick={exportCSV} style={{ background: "rgba(96,165,250,0.12)", border: "1px solid rgba(96,165,250,0.3)", borderRadius: "8px", padding: "7px 13px", color: "#60a5fa", cursor: "pointer", fontFamily: "inherit", fontSize: "12px", fontWeight: "700" }}>
                📥 CSV
              </button>
            </div>
          </div>

          {/* Pillar breakdown */}
          <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
            {Object.entries(pillarCounts).map(([pillar, count]) => {
              const c = PILLAR_COLORS[pillar] || PILLAR_COLORS["Engage"];
              return (
                <div key={pillar} style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: "100px", padding: "5px 13px", display: "flex", alignItems: "center", gap: "6px" }}>
                  <span style={{ color: c.text, fontSize: "11px", fontWeight: "800" }}>{pillar}</span>
                  <span style={{ background: c.border, borderRadius: "100px", padding: "1px 6px", color: c.text, fontSize: "10px", fontWeight: "900" }}>{count}</span>
                </div>
              );
            })}
            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "100px", padding: "5px 13px", color: "#4a5568", fontSize: "11px", fontWeight: "700" }}>
              {totalDays} total posts
            </div>
          </div>

          {/* Week tabs */}
          <div style={{ display: "flex", gap: "6px", overflowX: "auto", paddingBottom: "2px" }}>
            {weeks.map((w, wi) => {
              const c = w.color || "#60a5fa";
              const isActive = activeWeek === wi;
              return (
                <button key={wi} onClick={() => setActiveWeek(wi)} style={{
                  background: isActive ? `${c}20` : "rgba(0,0,0,0.3)",
                  border: `1px solid ${isActive ? c : "rgba(255,255,255,0.08)"}`,
                  borderRadius: "12px", padding: "10px 16px", cursor: "pointer",
                  fontFamily: "inherit", whiteSpace: "nowrap", transition: "all 0.2s",
                  minWidth: "130px", textAlign: "left", flexShrink: 0,
                }}>
                  <div style={{ color: isActive ? c : "#4a5568", fontSize: "10px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "3px" }}>{w.weekLabel}</div>
                  <div style={{ color: isActive ? "#e2e8f0" : "#718096", fontSize: "12px", fontWeight: "700" }}>{w.theme}</div>
                  <div style={{ color: "#4a5568", fontSize: "10px", marginTop: "2px" }}>{w.days?.length || 0} posts</div>
                </button>
              );
            })}
          </div>

          {/* Week goal banner */}
          {currentWeek && (
            <div style={{ background: `${currentWeek.color || "#60a5fa"}10`, border: `1px solid ${currentWeek.color || "#60a5fa"}30`, borderRadius: "12px", padding: "12px 18px", display: "flex", alignItems: "center", gap: "10px" }}>
              <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: currentWeek.color || "#60a5fa", flexShrink: 0, boxShadow: `0 0 8px ${currentWeek.color || "#60a5fa"}` }} />
              <div>
                <span style={{ color: currentWeek.color || "#60a5fa", fontWeight: "800", fontSize: "12px" }}>{currentWeek.weekLabel}: {currentWeek.theme}</span>
                {currentWeek.themeGoal && <span style={{ color: "#718096", fontSize: "12px" }}> — {currentWeek.themeGoal}</span>}
              </div>
            </div>
          )}

          {/* ── GRID VIEW ── */}
          {viewMode === "grid" && currentWeek && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: "10px" }}>
              {(currentWeek.days || []).map((d, di) => {
                const pillarStyle = PILLAR_COLORS[d.pillar] || PILLAR_COLORS["Engage"];
                const weekColor = currentWeek.color || "#60a5fa";
                const isExpanded = expandedDay === `${activeWeek}-${di}`;
                return (
                  <div key={di} style={{
                    background: "rgba(0,0,0,0.3)", border: `1px solid rgba(255,255,255,0.07)`,
                    borderRadius: "14px", overflow: "hidden", transition: "all 0.25s", cursor: "pointer",
                  }}
                    onClick={() => setExpandedDay(isExpanded ? null : `${activeWeek}-${di}`)}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = weekColor + "55"; e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = `0 8px 24px rgba(0,0,0,0.3)`; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
                  >
                    {/* Top accent */}
                    <div style={{ height: "3px", background: `linear-gradient(90deg, ${weekColor}, ${weekColor}40)` }} />
                    <div style={{ padding: "14px" }}>
                      {/* Day number + type */}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                          <div style={{ background: `${weekColor}20`, border: `1px solid ${weekColor}40`, borderRadius: "8px", padding: "4px 8px", fontFamily: "var(--font-display)", fontWeight: "900", fontSize: "13px", color: weekColor }}>
                            {d.dayName || `D${d.day}`}
                          </div>
                          <span style={{ color: "#4a5568", fontSize: "11px", fontWeight: "600" }}>#{d.day}</span>
                        </div>
                        <span style={{ fontSize: "18px" }}>{d.emoji || TYPE_ICONS[d.contentType] || "📌"}</span>
                      </div>

                      {/* Content type + pillar badges */}
                      <div style={{ display: "flex", gap: "5px", marginBottom: "10px", flexWrap: "wrap" }}>

                      </div>

                      {/* Idea */}
                      <div style={{ color: "#e2e8f0", fontSize: "12px", fontWeight: "700", lineHeight: "1.45", marginBottom: "8px" }}>{d.idea}</div>

                      {/* Hook */}
                      <div style={{ color: "#718096", fontSize: "11px", lineHeight: "1.5", fontStyle: "italic", marginBottom: isExpanded ? "10px" : "0" }}>"{d.hook}"</div>

                      {/* Expanded content */}
                      {isExpanded && (
                        <div style={{ animation: "fadeInUp 0.2s ease" }}>
                          {d.caption && (
                            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: "8px", padding: "10px", marginBottom: "10px" }}>
                              <div style={{ color: "#4a5568", fontSize: "9px", fontWeight: "700", textTransform: "uppercase", marginBottom: "5px" }}>Caption</div>
                              <div style={{ color: "#94a3b8", fontSize: "11px", lineHeight: "1.6" }}>{d.caption}</div>
                            </div>
                          )}
                          {d.bestTime && (
                            <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "10px" }}>
                              <span style={{ color: "#4a5568", fontSize: "10px" }}>⏰ Best time to post:</span>
                              <span style={{ color: "#fbbf24", fontSize: "10px", fontWeight: "700" }}>{d.bestTime}</span>
                            </div>
                          )}
                          <button onClick={e => { e.stopPropagation(); setTopic(d.idea); }} style={{
                            width: "100%", background: `${weekColor}20`, border: `1px solid ${weekColor}40`,
                            borderRadius: "8px", padding: "8px", color: weekColor,
                            cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "700", transition: "all 0.2s",
                          }}>
                            ⚡ Use as Topic →
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── LIST VIEW ── */}
          {viewMode === "list" && currentWeek && (
            <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
              {(currentWeek.days || []).map((d, di) => {
                const pillarStyle = PILLAR_COLORS[d.pillar] || PILLAR_COLORS["Engage"];
                const weekColor = currentWeek.color || "#60a5fa";
                return (
                  <div key={di} style={{
                    background: "rgba(0,0,0,0.25)", border: "1px solid rgba(255,255,255,0.06)",
                    borderRadius: "12px", padding: "14px 18px",
                    display: "flex", gap: "14px", alignItems: "flex-start",
                    transition: "all 0.2s", position: "relative", overflow: "hidden",
                  }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = weekColor + "44"; e.currentTarget.style.background = `${weekColor}08`; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"; e.currentTarget.style.background = "rgba(0,0,0,0.25)"; }}
                  >
                    <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "3px", background: weekColor, borderRadius: "0 2px 2px 0" }} />
                    {/* Day badge */}
                    <div style={{ flexShrink: 0, textAlign: "center", minWidth: "44px" }}>
                      <div style={{ fontFamily: "var(--font-display)", color: weekColor, fontWeight: "900", fontSize: "13px" }}>{d.dayName || "Day"}</div>
                      <div style={{ color: "#4a5568", fontSize: "10px", fontWeight: "700" }}>#{d.day}</div>
                    </div>
                    {/* Main content */}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", gap: "5px", marginBottom: "6px", flexWrap: "wrap", alignItems: "center" }}>
                        <span style={{ fontSize: "14px" }}>{d.emoji || TYPE_ICONS[d.contentType] || "📌"}</span>
                        <span style={{ background: "rgba(167,139,250,0.12)", borderRadius: "5px", padding: "1px 6px", color: "#c4b5fd", fontSize: "9px", fontWeight: "700" }}>{d.contentType}</span>
                        <span style={{ background: pillarStyle.bg, borderRadius: "5px", padding: "1px 6px", color: pillarStyle.text, fontSize: "9px", fontWeight: "700" }}>{d.pillar}</span>
                        {d.bestTime && <span style={{ color: "#fbbf24", fontSize: "10px", fontWeight: "600" }}>⏰ {d.bestTime}</span>}
                      </div>
                      <div style={{ color: "#e2e8f0", fontSize: "13px", fontWeight: "700", marginBottom: "4px" }}>{d.idea}</div>
                      <div style={{ color: "#718096", fontSize: "12px", fontStyle: "italic" }}>"{d.hook}"</div>
                      {d.caption && <div style={{ color: "#4a5568", fontSize: "11px", marginTop: "5px", lineHeight: "1.5" }}>{d.caption}</div>}
                    </div>
                    {/* Actions */}
                    <div style={{ display: "flex", flexDirection: "column", gap: "5px", flexShrink: 0 }}>
                      <button onClick={() => setTopic(d.idea)} style={{ background: `${weekColor}18`, border: `1px solid ${weekColor}35`, borderRadius: "7px", padding: "5px 10px", color: weekColor, cursor: "pointer", fontFamily: "inherit", fontSize: "10px", fontWeight: "700", whiteSpace: "nowrap" }}>Use →</button>
                      <button onClick={() => { try { const t = document.createElement("textarea"); t.value = `${d.idea}\n\nHook: ${d.hook}${d.caption ? "\n\n" + d.caption : ""}`; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); } catch {} }} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "7px", padding: "5px 10px", color: "#4a5568", cursor: "pointer", fontFamily: "inherit", fontSize: "10px", fontWeight: "700" }}>Copy</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

        </div>
      )}
    </div>
  );
}

                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

          {!loading && result && <ImprovedResultCard result={result} type={selectedType.label} onRegenerate={handleGenerate} />}

          {/* ── PRO MODE PANEL ── */}
          {result && !loading && (
            <ProModePanel
              result={result}
              topic={topic}
              selectedType={selectedType}
              handleEnhance={handleEnhance}
              handleScore={handleScore}
              handleMultiPlatform={handleMultiPlatform}
              handleRemix={handleRemix}
              handleExportPack={handleExportPack}
              enhancing={enhancing}
              scoringLoading={scoringLoading}
              multiLoading={multiLoading}
              remixLoading={remixLoading}
              promptScore={promptScore}
              enhancedResult={enhancedResult}
              remixResult={remixResult}
              multiResults={multiResults}
            />
          )}

          {/* Comparison Results */}
          {(comparisonResults.length > 0 || comparisonLoading) && (
            <div style={{ animation: "fadeInUp 0.4s ease" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "14px" }}>
                <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: "#a78bfa", boxShadow: "0 0 8px #a78bfa" }} />
                <span style={{ color: "#c4b5fd", fontSize: "13px", fontWeight: "700" }}>⚖️ Comparison Mode — {comparisonResults.length}/3 variations</span>
                {comparisonLoading && <span style={{ color: "#4a5568", fontSize: "11px" }}>Generating next variation...</span>}
              </div>
              {selectedVariation !== null && (
                <div style={{ marginBottom: "12px", background: "rgba(52,211,153,0.08)", border: "1px solid rgba(52,211,153,0.25)", borderRadius: "10px", padding: "10px 14px", display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ fontSize: "16px" }}>✅</span>
                  <span style={{ color: "#34d399", fontSize: "12px", fontWeight: "700" }}>Selected: {comparisonResults[selectedVariation]?.label}</span>
                  <button onClick={() => { setResult(comparisonResults[selectedVariation]?.result); setComparisonResults([]); setSelectedVariation(null); }} style={{ marginLeft: "auto", background: "rgba(52,211,153,0.15)", border: "1px solid rgba(52,211,153,0.3)", borderRadius: "6px", padding: "4px 12px", color: "#34d399", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "700" }}>Use This as Main Result →</button>
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(270px, 1fr))", gap: "12px" }}>
                {comparisonResults.map((cv, i) => (
                  <div key={i} style={{ border: `2px solid ${selectedVariation === i ? "#a78bfa" : "rgba(255,255,255,0.06)"}`, borderRadius: "14px", overflow: "hidden", transition: "border-color 0.2s", background: "rgba(0,0,0,0.2)" }}>
                    <div style={{ padding: "10px 14px", background: selectedVariation === i ? "rgba(167,139,250,0.1)" : "rgba(255,255,255,0.02)", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                      <span style={{ color: selectedVariation === i ? "#c4b5fd" : "#94a3b8", fontWeight: "800", fontSize: "13px" }}>{cv.label}</span>
                      <button onClick={() => setSelectedVariation(i)} style={{ background: selectedVariation === i ? "#a78bfa" : "rgba(167,139,250,0.15)", border: "none", borderRadius: "6px", padding: "4px 12px", color: selectedVariation === i ? "white" : "#c4b5fd", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "700" }}>
                        {selectedVariation === i ? "✓ Selected" : "Select"}
                      </button>
                    </div>
                    <div style={{ padding: "14px" }}>
                      <div style={{ color: "#4a5568", fontSize: "9px", fontWeight: "700", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: "5px" }}>HOOK</div>
                      <div style={{ color: "#e2e8f0", fontSize: "13px", fontWeight: "600", lineHeight: "1.5", marginBottom: "12px" }}>{cv.result?.hook}</div>
                      <div style={{ color: "#4a5568", fontSize: "9px", fontWeight: "700", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: "5px" }}>PROMPT PREVIEW</div>
                      <div style={{ color: "#718096", fontSize: "11px", lineHeight: "1.6", marginBottom: "12px", display: "-webkit-box", WebkitLineClamp: 3, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{cv.result?.prompt}</div>
                      <div style={{ display: "flex", gap: "6px" }}>
                        <button onClick={() => { const ta = document.createElement("textarea"); ta.value = cv.result?.prompt || ""; ta.style.cssText = "position:fixed;top:-9999px;opacity:0;"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }} style={{ flex: 1, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "7px", padding: "6px", color: "#718096", cursor: "pointer", fontFamily: "inherit", fontSize: "11px" }}>Copy</button>
                        <button onClick={() => handleExportPack(cv.result, cv.label)} style={{ flex: 1, background: "rgba(96,165,250,0.08)", border: "1px solid rgba(96,165,250,0.2)", borderRadius: "7px", padding: "6px", color: "#60a5fa", cursor: "pointer", fontFamily: "inherit", fontSize: "11px" }}>Export</button>

                    </div>
                  </div>

              </div>
            </div>
          )}

        </div>

        {/* ── RIGHT SIDEBAR ── */}
        <div style={{ display: "flex", flexDirection: "column", gap: "12px", position: "sticky", top: "80px" }}>

          {/* Active settings summary */}

                </div>
              ))}
            </div>
          </div>

          {/* Tips */}
          <div style={{ background: "linear-gradient(135deg, rgba(167,139,250,0.07), rgba(96,165,250,0.07))", border: "1px solid rgba(167,139,250,0.18)", borderRadius: "14px", padding: "14px" }}>

            <div style={{ display: "flex", flexDirection: "column", gap: "7px" }}>

                "Specific location ya emotion add karein",

                "Urdu/Roman Urdu mein Pakistani audience ke liye",
                "'✨ AI Enhance' — prompt 40% stronger ho jaata hai",
                "📊 Score — prompt kitna viral hai",

                <div key={i} style={{ display: "flex", gap: "7px", alignItems: "flex-start" }}>
                  <div style={{ width: "4px", height: "4px", borderRadius: "50%", background: "#a78bfa", marginTop: "6px", flexShrink: 0 }} />
                  <span style={{ color: "#718096", fontSize: "11px", lineHeight: "1.5" }}>{tip}</span>
                </div>
              ))}
            </div>
          </div>

          {/* History */}
          <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "14px", padding: "14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>

                <button onClick={() => setHistory([])} style={{ background: "none", border: "none", color: "#4a5568", cursor: "pointer", fontSize: "10px", fontFamily: "inherit" }}>Clear</button>
              )}
            </div>
            {history.length === 0 ? (
              <div style={{ textAlign: "center", padding: "24px 10px" }}>
                <div style={{ fontSize: "32px", marginBottom: "8px", opacity: 0.4 }}>🤖</div>

              </div>

                    onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.05)"; e.currentTarget.style.background = "rgba(0,0,0,0.3)"; }}

                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function LibraryPage() {
  const [selectedCategory, setSelectedCategory] = useState("All");
  const [searchQuery, setSearchQuery] = useState("");
  const [favorites, setFavorites] = useState([]);
  const [sortBy, setSortBy] = useState("trending");
  const [viewMode, setViewMode] = useState("grid");
  const [expandedId, setExpandedId] = useState(null);
  const [aiRemixing, setAiRemixing] = useState(null);
  const [remixResults, setRemixResults] = useState({});
  const [savedTab, setSavedTab] = useState(false); // My Saved Prompts tab
  const [savedPrompts, setSavedPrompts] = useState([]);
  const [expandedSaved, setExpandedSaved] = useState(null);

  // Load saved prompts from localStorage
  React.useEffect(() => {
    try {
      const raw = JSON.parse(localStorage.getItem("cph_saved_prompts") || "[]");
      setSavedPrompts(raw);
    } catch {}
  }, [savedTab]); // refresh when tab is opened

  const removeSaved = (id) => {
    try {
      const updated = savedPrompts.filter(p => p.id !== id);
      localStorage.setItem("cph_saved_prompts", JSON.stringify(updated));
      setSavedPrompts(updated);
    } catch {}
  };

  const clearAllSaved = () => {
    try { localStorage.removeItem("cph_saved_prompts"); } catch {}
    setSavedPrompts([]);
  };

  const categories = ["All", "Saved", ...new Set(EXTENDED_LIBRARY.map(p => p.category))];
  const catIcons = { "All": "✦", "Saved": "❤️", "Fashion": "👗", "Travel": "✈️", "Tech": "💻", "Fitness": "💪", "AI Art": "🤖", "Business": "💼", "Motivation": "🔥", "Food": "🍽️", "Gaming": "🎮", "Beauty": "💄", "Nature": "🌿", "Architecture": "🏛️", "Music": "🎵", "Lifestyle": "🌟", "Finance": "💰", "Art": "🎨" };

  const toggleFav = (id) => setFavorites(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);

  const sorted = [...EXTENDED_LIBRARY]
    .filter(p => {
      if (selectedCategory === "Saved") return favorites.includes(p.id);
      const matchCat = selectedCategory === "All" || p.category === selectedCategory;
      const matchSearch = !searchQuery || p.title.toLowerCase().includes(searchQuery.toLowerCase()) || p.prompt.toLowerCase().includes(searchQuery.toLowerCase());
      return matchCat && matchSearch;
    })
    .sort((a, b) => {
      if (sortBy === "votes") return b.votes - a.votes;
      if (sortBy === "trending") return (b.trending ? 1 : 0) - (a.trending ? 1 : 0);
      return a.title.localeCompare(b.title);
    });

  const handleRemix = async (p) => {
    setAiRemixing(p.id);
    try {
      const raw = await callClaude(
        `You are an expert prompt remixer. Take the given prompt and create a fresh, creative variation that keeps the core concept but changes the style, mood, or setting dramatically. Respond ONLY with valid JSON: { "remixed": "the new prompt text" }`,
        `Original prompt: ${p.prompt}\nCategory: ${p.category}\n\nCreate a surprising remix.`
      );
      const parsed = JSON.parse(raw.replace(/```json|```/g, "").trim());
      setRemixResults(prev => ({ ...prev, [p.id]: parsed.remixed }));
    } catch { } finally { setAiRemixing(null); }
  };

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "16px", marginBottom: "32px" }}>
        <div>
          <h2 style={{ fontFamily: "var(--font-display)", color: "#e2e8f0", fontSize: "32px", fontWeight: "900", margin: 0, letterSpacing: "-0.02em" }}>
            {savedTab ? "My Saved Prompts" : "Prompt Library"}
          </h2>
          <p style={{ color: "#718096", fontSize: "14px", marginTop: "6px" }}>
            {savedTab ? `${savedPrompts.length} saved prompt${savedPrompts.length !== 1 ? "s" : ""}` : `${sorted.length} prompts · Curated for creators by creators`}
          </p>
        </div>
        <div style={{ display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" }}>
          {/* My Saved toggle */}
          <button onClick={() => setSavedTab(p => !p)} style={{
            display: "flex", alignItems: "center", gap: "7px",
            background: savedTab ? "rgba(52,211,153,0.15)" : "rgba(255,255,255,0.04)",
            border: `1px solid ${savedTab ? "rgba(52,211,153,0.4)" : "rgba(255,255,255,0.1)"}`,
            borderRadius: "10px", padding: "10px 16px",
            color: savedTab ? "#34d399" : "#718096",
            cursor: "pointer", fontFamily: "inherit", fontSize: "13px", fontWeight: "700",
            transition: "all 0.2s",
          }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill={savedTab ? "#34d399" : "none"} stroke={savedTab ? "#34d399" : "currentColor"} strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            My Saved
            {savedPrompts.length > 0 && <span style={{ background: savedTab ? "#34d399" : "rgba(52,211,153,0.2)", color: savedTab ? "#000" : "#34d399", borderRadius: "100px", padding: "1px 7px", fontSize: "10px", fontWeight: "900" }}>{savedPrompts.length}</span>}
          </button>
          {/* Search */}
          <div style={{ position: "relative" }}>
            <span style={{ position: "absolute", left: "12px", top: "50%", transform: "translateY(-50%)", color: "#4a5568", fontSize: "14px" }}>🔍</span>
            <input
              type="text"
              placeholder="Search prompts..."
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              style={{
                background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: "10px", padding: "10px 16px 10px 36px", color: "#e2e8f0",
                fontFamily: "inherit", fontSize: "13px", outline: "none", width: "200px",
              }}
              onFocus={e => e.target.style.borderColor = "rgba(167,139,250,0.4)"}
              onBlur={e => e.target.style.borderColor = "rgba(255,255,255,0.1)"}
            />
          </div>
          {/* Sort */}
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{
            background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "10px",
            padding: "10px 14px", color: "#94a3b8", fontFamily: "inherit", fontSize: "13px", outline: "none", cursor: "pointer",
          }}>
            <option value="trending">🔥 Trending</option>
            <option value="votes">👍 Most Voted</option>
            <option value="alpha">🔤 A–Z</option>
          </select>
          {/* View toggle */}
          <div style={{ display: "flex", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "4px", gap: "2px" }}>
            {[{ v: "grid", icon: "⊞" }, { v: "list", icon: "☰" }].map(({ v, icon }) => (
              <button key={v} onClick={() => setViewMode(v)} style={{
                background: viewMode === v ? "rgba(167,139,250,0.25)" : "transparent",
                border: "none", borderRadius: "7px", padding: "6px 10px", cursor: "pointer",
                color: viewMode === v ? "#c4b5fd" : "#4a5568", fontSize: "14px", transition: "all 0.2s",
              }}>{icon}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Category tabs */}
      {savedTab ? (
        /* ── MY SAVED PROMPTS ── */
        <div style={{ animation: "fadeInUp 0.3s ease" }}>
          {savedPrompts.length === 0 ? (
            <div style={{ textAlign: "center", padding: "80px 20px", color: "#2d3748" }}>
              <div style={{ fontSize: "48px", marginBottom: "16px", opacity: 0.4 }}>📋</div>
              <div style={{ fontSize: "16px", fontWeight: "700", color: "#4a5568", marginBottom: "8px" }}>No saved prompts yet</div>
              <div style={{ fontSize: "13px" }}>Hit the Save button on any generated result to keep it here.</div>
            </div>
          ) : (
            <>
              <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "16px" }}>
                <button onClick={clearAllSaved} style={{ background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.2)", borderRadius: "8px", padding: "6px 14px", color: "#f87171", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "700" }}>
                  Clear All
                </button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                {savedPrompts.map(p => {
                  const isExpanded = expandedSaved === p.id;
                  return (
                    <div key={p.id} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "16px", overflow: "hidden", transition: "all 0.2s" }}>
                      <div style={{ padding: "16px 18px", display: "flex", alignItems: "flex-start", gap: "12px" }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
                            <span style={{ background: "rgba(52,211,153,0.12)", border: "1px solid rgba(52,211,153,0.25)", borderRadius: "5px", padding: "2px 8px", color: "#34d399", fontSize: "10px", fontWeight: "700" }}>{p.type}</span>
                            <span style={{ color: "#2d3748", fontSize: "10px" }}>{p.savedAt}</span>
                          </div>
                          <p style={{ color: "#94a3b8", fontSize: "13px", lineHeight: "1.6", margin: 0, display: "-webkit-box", WebkitLineClamp: isExpanded ? "none" : 2, WebkitBoxOrient: "vertical", overflow: isExpanded ? "visible" : "hidden" }}>
                            {p.result?.prompt || p.result?.hook || "No content"}
                          </p>
                        </div>
                        <div style={{ display: "flex", gap: "6px", flexShrink: 0 }}>
                          <button onClick={() => setExpandedSaved(isExpanded ? null : p.id)} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "7px", padding: "5px 10px", color: "#718096", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "600" }}>
                            {isExpanded ? "Collapse" : "Expand"}
                          </button>
                          <button onClick={() => removeSaved(p.id)} style={{ background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.18)", borderRadius: "7px", padding: "5px 10px", color: "#f87171", cursor: "pointer", fontFamily: "inherit", fontSize: "11px", fontWeight: "600" }}>
                            Remove
                          </button>
                        </div>
                      </div>
                      {isExpanded && p.result && (
                        <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", padding: "14px 18px", display: "flex", flexDirection: "column", gap: "10px" }}>
                          {["prompt","hook","caption","hashtags","cta"].filter(k => p.result[k]).map(k => (
                            <div key={k}>
                              <div style={{ color: "#4a5568", fontSize: "9px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "4px" }}>{k}</div>
                              <p style={{ color: "#94a3b8", fontSize: "12px", lineHeight: "1.65", margin: 0 }}>{p.result[k]}</p>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      ) : (
        <>
      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "28px" }}>
        {categories.map(cat => {
          const isActive = selectedCategory === cat;
          const count = cat === "All" ? EXTENDED_LIBRARY.length : cat === "Saved" ? favorites.length : EXTENDED_LIBRARY.filter(p => p.category === cat).length;
          return (
            <button key={cat} onClick={() => setSelectedCategory(cat)} style={{
              background: isActive ? "linear-gradient(135deg, rgba(167,139,250,0.25), rgba(96,165,250,0.15))" : "rgba(255,255,255,0.03)",
              border: `1px solid ${isActive ? "rgba(167,139,250,0.5)" : "rgba(255,255,255,0.08)"}`,
              borderRadius: "100px", padding: "8px 16px", cursor: "pointer", fontFamily: "inherit",
              fontSize: "12px", fontWeight: "700", transition: "all 0.2s",
              color: isActive ? "#c4b5fd" : "#718096",
              display: "flex", alignItems: "center", gap: "6px",
            }}>
              <span>{catIcons[cat] || "•"}</span> {cat}
              <span style={{
                background: isActive ? "rgba(167,139,250,0.3)" : "rgba(255,255,255,0.06)",
                borderRadius: "100px", padding: "1px 7px", fontSize: "10px", fontWeight: "800",
                color: isActive ? "#c4b5fd" : "#4a5568",
              }}>{count}</span>
            </button>
          );
        })}
      </div>

      {/* Empty state */}
      {sorted.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 20px", color: "#4a5568" }}>
          <div style={{ fontSize: "40px", marginBottom: "16px" }}>🔍</div>
          <div style={{ fontFamily: "var(--font-display)", fontSize: "18px", fontWeight: "700", color: "#718096", marginBottom: "8px" }}>No prompts found</div>
          <div style={{ fontSize: "14px" }}>Try a different search or category</div>
        </div>
      )}

      {/* Grid view */}
      {viewMode === "grid" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: "18px" }}>
          {sorted.map(p => {
            const isExpanded = expandedId === p.id;
            const isFav = favorites.includes(p.id);
            const hasRemix = remixResults[p.id];
            return (
              <div key={p.id} style={{
                background: "rgba(255,255,255,0.02)", border: `1px solid ${isFav ? "rgba(244,114,182,0.3)" : "rgba(255,255,255,0.07)"}`,
                borderRadius: "20px", overflow: "hidden", transition: "all 0.3s", position: "relative",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = isFav ? "rgba(244,114,182,0.5)" : "rgba(167,139,250,0.35)"; e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.boxShadow = "0 12px 40px rgba(0,0,0,0.3)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = isFav ? "rgba(244,114,182,0.3)" : "rgba(255,255,255,0.07)"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
              >
                {/* Top accent bar */}
                <div style={{ height: "3px", background: p.trending ? "linear-gradient(90deg, #fbbf24, #fb923c)" : "linear-gradient(90deg, #a78bfa, #60a5fa)", opacity: p.trending ? 1 : 0.4 }} />
                <div style={{ padding: "20px" }}>
                  {/* Meta row */}
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "14px" }}>
                    <span style={{ background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.25)", borderRadius: "7px", padding: "3px 9px", color: "#c4b5fd", fontSize: "11px", fontWeight: "700" }}>{p.category}</span>
                    {p.trending && <span style={{ background: "rgba(251,191,36,0.12)", border: "1px solid rgba(251,191,36,0.3)", borderRadius: "100px", padding: "2px 8px", color: "#fbbf24", fontSize: "10px", fontWeight: "700" }}>🔥 HOT</span>}
                    <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: "12px" }}>
                      <span style={{ color: "#4a5568", fontSize: "12px", fontWeight: "600" }}>👍 {p.votes.toLocaleString()}</span>
                      <button onClick={() => toggleFav(p.id)} style={{ background: "none", border: "none", cursor: "pointer", color: isFav ? "#f472b6" : "#2d3748", padding: "4px", transition: "all 0.2s", fontSize: "16px" }}>
                        {isFav ? "♥" : "♡"}
                      </button>
                    </div>
                  </div>

                  <h3 style={{ fontFamily: "var(--font-display)", color: "#e2e8f0", fontSize: "16px", fontWeight: "800", marginBottom: "10px", lineHeight: "1.3" }}>{p.title}</h3>

                  {/* Prompt preview / expanded */}
                  <p style={{ color: "#718096", fontSize: "13px", lineHeight: "1.7", marginBottom: "14px", display: "-webkit-box", WebkitLineClamp: isExpanded ? "none" : 3, WebkitBoxOrient: "vertical", overflow: isExpanded ? "visible" : "hidden" }}>
                    {hasRemix ? remixResults[p.id] : p.prompt}
                  </p>
                  {hasRemix && (
                    <div style={{ background: "rgba(167,139,250,0.08)", border: "1px solid rgba(167,139,250,0.2)", borderRadius: "8px", padding: "6px 10px", marginBottom: "10px", display: "flex", alignItems: "center", gap: "6px" }}>
                      <span style={{ fontSize: "11px", color: "#c4b5fd", fontWeight: "700" }}>✨ AI Remixed</span>
                      <button onClick={() => setRemixResults(prev => { const n = {...prev}; delete n[p.id]; return n; })} style={{ marginLeft: "auto", background: "none", border: "none", color: "#4a5568", cursor: "pointer", fontSize: "11px" }}>Reset</button>
                    </div>
                  )}
                  <button onClick={() => setExpandedId(isExpanded ? null : p.id)} style={{ background: "none", border: "none", color: "#4a5568", cursor: "pointer", fontSize: "11px", fontWeight: "600", padding: 0, marginBottom: "14px" }}>
                    {isExpanded ? "▲ Show less" : "▼ Show full prompt"}
                  </button>

                  {/* Tags */}

function MiniSparkline({ data, color }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const w = 80, h = 32, pad = 2;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ overflow: "visible" }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.8" />
      <circle cx={pts.split(" ").pop().split(",")[0]} cy={pts.split(" ").pop().split(",")[1]} r="3" fill={color} />
    </svg>
  );
}

function AuthModal({ initialMode, onClose, onAuth }) {
  const [mode, setMode] = useState(initialMode || "signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);

  const handleSubmit = () => {
    setError("");
    if (!email.trim()) { setError("Please enter your email."); return; }
    if (!password.trim() || password.length < 6) { setError("Password must be at least 6 characters."); return; }
    if (mode === "signup" && !name.trim()) { setError("Please enter your name."); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      onAuth({ name: name || email.split("@")[0], email });
      onClose();
    }, 1200);
  };

  const handleSocial = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      onAuth({ name: "Creator", email: "creator@example.com" });
      onClose();
    }, 1000);
  };

  const InputField = ({ label, type, value, onChange, placeholder }) => (
    <div>

                            <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: "linear-gradient(135deg, #a78bfa, #60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontSize: "16px", fontWeight: "900", color: "white", flexShrink: 0 }}>{user.name[0].toUpperCase()}</div>
                            <div style={{ minWidth: 0 }}>
                              <div style={{ color: "#e2e8f0", fontWeight: "700", fontSize: "13px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</div>
                              <div style={{ color: "#4a5568", fontSize: "11px", marginTop: "1px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.email}</div>
                            </div>
                          </div>
                          {/* Plan badge */}
                          <div style={{ marginTop: "10px", display: "flex", gap: "6px" }}>
                            <div style={{ display: "inline-flex", alignItems: "center", gap: "4px", background: "rgba(52,211,153,0.1)", border: "1px solid rgba(52,211,153,0.2)", borderRadius: "6px", padding: "4px 10px" }}>
                              <div style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#34d399" }} />
                              <span style={{ color: "#34d399", fontSize: "10px", fontWeight: "800", letterSpacing: "0.04em" }}>FREE PLAN</span>
                            </div>
                            <div style={{ display: "inline-flex", alignItems: "center", gap: "4px", background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.18)", borderRadius: "6px", padding: "4px 10px" }}>
                              <span style={{ color: "#fbbf24", fontSize: "10px", fontWeight: "800" }}>🔥 11-day streak</span>
                            </div>
                          </div>
                        </div>

                        {/* Menu items */}
                        {[
                          { icon: "🎛️", label: "Dashboard",    sub: "Stats & activity",   action: () => { setActiveTab("Dashboard"); setShowUserMenu(false); } },
                          { icon: "💾", label: "Saved Prompts", sub: "Your favorites",      action: () => { setActiveTab("Library"); setShowUserMenu(false); } },
                          { icon: "📜", label: "History",       sub: "Recent generations", action: () => { setActiveTab("Generator"); setShowUserMenu(false); } },
                          { icon: "⚙️", label: "Settings",      sub: "Account & prefs",    action: () => setShowUserMenu(false) },
                        ].map(item => (
                          <button key={item.label} onClick={item.action} style={{
                            width: "100%", background: "none", border: "none", borderRadius: "10px",
                            padding: "9px 12px", cursor: "pointer", fontFamily: "inherit",
                            display: "flex", alignItems: "center", gap: "10px", transition: "all 0.15s", textAlign: "left",
                          }}
                            onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.05)"}
                            onMouseLeave={e => e.currentTarget.style.background = "none"}
                          >
                            <div style={{ width: "30px", height: "30px", borderRadius: "8px", background: "rgba(255,255,255,0.05)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", flexShrink: 0 }}>{item.icon}</div>
                            <div>
                              <div style={{ color: "#e2e8f0", fontSize: "13px", fontWeight: "600" }}>{item.label}</div>
                              <div style={{ color: "#4a5568", fontSize: "11px" }}>{item.sub}</div>
                            </div>
                          </button>
                        ))}

                        {/* Upgrade nudge */}
                        <div style={{ margin: "6px", background: "linear-gradient(135deg, rgba(167,139,250,0.1), rgba(96,165,250,0.1))", border: "1px solid rgba(167,139,250,0.18)", borderRadius: "10px", padding: "10px 12px" }}>
                          <div style={{ color: "#c4b5fd", fontSize: "12px", fontWeight: "700", marginBottom: "4px" }}>⚡ Upgrade to Pro</div>
                          <div style={{ color: "#4a5568", fontSize: "11px", marginBottom: "8px" }}>Unlimited prompts, priority AI, team sharing</div>
                        </div>

                        <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", marginTop: "4px", paddingTop: "4px" }}>
                          <button onClick={handleSignOut} style={{
                            width: "100%", background: "none", border: "none", borderRadius: "10px",
                            padding: "9px 12px", cursor: "pointer", fontFamily: "inherit",
                            fontSize: "13px", color: "#f87171", display: "flex", alignItems: "center", gap: "10px",
                            transition: "all 0.15s", textAlign: "left",
                          }}
                            onMouseEnter={e => e.currentTarget.style.background = "rgba(248,113,113,0.07)"}
                            onMouseLeave={e => e.currentTarget.style.background = "none"}
                          >
                            <div style={{ width: "30px", height: "30px", borderRadius: "8px", background: "rgba(248,113,113,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px" }}>🚪</div>
                            <div>
                              <div style={{ fontSize: "13px", fontWeight: "600" }}>Sign Out</div>
                            </div>
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: "8px" }}>
                    <button onClick={() => openAuth("signin")} style={{
                      background: "rgba(255,255,255,0.05)", color: "#94a3b8",
                      border: "1px solid rgba(255,255,255,0.1)", borderRadius: "10px",
                      padding: "8px 16px", fontFamily: "inherit", fontSize: "13px", fontWeight: "600",
                      cursor: "pointer", transition: "all 0.2s",
                    }}
                      onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.08)"; e.currentTarget.style.color = "#e2e8f0"; }}
                      onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.05)"; e.currentTarget.style.color = "#94a3b8"; }}
                    >Sign In</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </nav>

        {/* Page content */}
        <main style={{ maxWidth: "1280px", margin: "0 auto", padding: "40px 24px 80px", position: "relative", zIndex: 1 }}>
          <div key={activeTab} style={{ animation: "fadeInUp 0.4s ease" }}>
            <PageComponent setActiveTab={setActiveTab} />
          </div>
        </main>

        {/* ── FOOTER ── */}
        <footer style={{
          borderTop: "1px solid rgba(255,255,255,0.06)",
          background: "linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 100%)",
          position: "relative", zIndex: 1, marginTop: "20px",
        }}>
          {/* Main footer columns */}
          <div style={{ maxWidth: "1280px", margin: "0 auto", padding: "48px 24px 32px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: "40px", marginBottom: "48px" }}>

              {/* Brand column */}
              <div>
                {/* Mini logo */}
                <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "16px" }}>
                  <div style={{
                    width: "32px", height: "32px", borderRadius: "9px",
                    background: "linear-gradient(145deg, #1a1040, #0d0820)",
                    border: "1px solid rgba(167,139,250,0.3)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                      <defs>
                        <linearGradient id="lgFoot" x1="0" y1="0" x2="1" y2="1">
                          <stop offset="0%" stopColor="#c4b5fd"/>
                          <stop offset="100%" stopColor="#60a5fa"/>
                        </linearGradient>
                      </defs>
                      <path d="M14.5 3.5C16.5 5 18 7.4 18 10c0 4.4-3.6 8-8 8S2 14.4 2 10 5.6 2 10 2c1 0 2 .2 2.9.5" stroke="url(#lgFoot)" strokeWidth="1.6" strokeLinecap="round" fill="none"/>
                      <path d="M11 2.5L9 8h4l-4 9.5" stroke="url(#lgFoot)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                    </svg>
                  </div>
                  <div>
                    <div style={{ fontFamily: "var(--font-display)", fontWeight: "900", fontSize: "15px", background: "linear-gradient(110deg, #ffffff, #c4b5fd)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>CreatorPrompt</div>
                    <div style={{ fontSize: "9px", color: "#4a5568", fontWeight: "700", letterSpacing: "0.14em", textTransform: "uppercase" }}>Hub · AI Studio</div>
                  </div>
                </div>
                <p style={{ color: "#4a5568", fontSize: "13px", lineHeight: "1.75", maxWidth: "280px", margin: "0 0 20px" }}>
                  The AI-powered prompt engine for modern creators. Built for Midjourney, TikTok, Instagram, YouTube, and beyond.
                </p>
                {/* Stats row */}
                <div style={{ display: "flex", gap: "20px" }}>
                  {[
                    { val: "2.4M+", label: "Prompts" },
                    { val: "180K+", label: "Creators" },
                    { val: "18",    label: "Types"   },
                  ].map(s => (
                    <div key={s.label}>
                      <div style={{ fontFamily: "var(--font-display)", fontSize: "16px", fontWeight: "900", color: "#c4b5fd" }}>{s.val}</div>
                      <div style={{ color: "#4a5568", fontSize: "11px", fontWeight: "600" }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Product column */}
              <div>
                <div style={{ color: "#718096", fontSize: "11px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "16px" }}>Product</div>
                {[
                  { label: "Generator",  tab: "Generator" },
                  { label: "Library",    tab: "Library"   },
                  { label: "Trending",   tab: "Trending"  },
                  { label: "Dashboard",  tab: "Dashboard" },
                  { label: "30-Day Plan",tab: "Generator" },
                ].map(item => (
                  <button key={item.label} onClick={() => setActiveTab(item.tab)} style={{
                    display: "block", background: "none", border: "none",
                    color: "#4a5568", cursor: "pointer", fontFamily: "inherit",
                    fontSize: "13px", padding: "5px 0", transition: "color 0.2s", textAlign: "left",
                  }}
                    onMouseEnter={e => e.currentTarget.style.color = "#94a3b8"}
                    onMouseLeave={e => e.currentTarget.style.color = "#4a5568"}
                  >{item.label}</button>
                ))}
              </div>

              {/* Content Types column */}
              <div>
                <div style={{ color: "#718096", fontSize: "11px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "16px" }}>Content Types</div>
                {["AI Image Prompts", "Midjourney", "TikTok Scripts", "Instagram Captions", "YouTube Shorts", "Viral Tweets", "Brand Stories", "Hashtag Generator"].map(item => (
                  <div key={item} style={{ color: "#4a5568", fontSize: "13px", padding: "5px 0", lineHeight: 1 }}>{item}</div>
                ))}
              </div>

              {/* Platforms column */}
              <div>
                <div style={{ color: "#718096", fontSize: "11px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "16px" }}>Platforms</div>
                {[
                  { icon: "📸", name: "Instagram" },
                  { icon: "🎵", name: "TikTok"    },
                  { icon: "▶️", name: "YouTube"   },
                  { icon: "🐦", name: "Twitter/X" },
                  { icon: "💼", name: "LinkedIn"  },
                  { icon: "📌", name: "Pinterest" },
                ].map(p => (
                  <div key={p.name} style={{ display: "flex", alignItems: "center", gap: "8px", padding: "5px 0" }}>
                    <span style={{ fontSize: "13px" }}>{p.icon}</span>
                    <span style={{ color: "#4a5568", fontSize: "13px" }}>{p.name}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Legal links row */}
            <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", paddingTop: "20px", marginBottom: "16px", display: "flex", gap: "20px", flexWrap: "wrap", alignItems: "center" }}>
              {[
                { label: "Privacy Policy",   id: "privacy" },
                { label: "Terms of Service", id: "terms" },
                { label: "Cookie Policy",    id: "cookies" },
                { label: "Refund Policy",    id: "refund" },
                { label: "GDPR",             id: "gdpr" },
                { label: "Acceptable Use",   id: "aup" },
              ].map(link => (
                <button key={link.id} onClick={() => setShowLegal(link.id)} style={{
                  background: "none", border: "none", padding: 0,
                  color: "#2d3748", fontSize: "11px", fontWeight: "600",
                  cursor: "pointer", fontFamily: "inherit", transition: "color 0.2s",
                }}
                  onMouseEnter={e => e.currentTarget.style.color = "#718096"}
                  onMouseLeave={e => e.currentTarget.style.color = "#2d3748"}
                >{link.label}</button>
              ))}
            </div>

            {/* Bottom bar */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "12px" }}>
              <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
                <div style={{ color: "#2d3748", fontSize: "11px" }}>
                  © 2026 CreatorPrompt Hub · All rights reserved · Built with ❤️ for the creator economy
                </div>
                <div style={{ color: "#1e2535", fontSize: "10px" }}>
                  CreatorPrompt Hub is not affiliated with Anthropic, Midjourney, OpenAI, or any third-party AI platforms mentioned.
                </div>
              </div>
            </div>
          </div>
        </footer>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
